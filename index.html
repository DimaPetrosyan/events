    <!--
      Базовые SEO / OG-теги в статике — их читают краулеры превью ссылок
      (Telegram, WhatsApp, VK и т.п.), которые НЕ выполняют JavaScript.
      Per-page-теги дополнительно формирует react-helmet-async (см. Seo.jsx)
      для поисковиков, исполняющих JS.
    -->
    <title>Студия МЕ — организация свадеб и праздников под ключ</title>

      name="description"

    />

    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://dimapetrosyan.github.io/events/" />
    <meta property="og:locale" content="ru_RU" />
